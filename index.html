<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observatorio Fiscal del Conurbano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   CONURBANO DATA — Tema personalizado
   Azul PBA #005EB8 · Azul Noche #002147 · Celeste #0099CC
   Naranja #E05C1A · Verde #00875A · Amarillo #F5A623
   Sora + JetBrains Mono
═══════════════════════════════════════════════════════ */
:root{
  --c1:#005EB8; --c1d:#002147; --c1l:#0099CC;
  --c2:#E05C1A; --c3:#00875A; --c4:#F5A623;
  --bg:#F4F6FA; --card:#FFFFFF;
  --ink:#0D1B2E; --ink2:#4A5878; --ink3:#8A9CC0;
  --borde:#DDE4F0;
  --norte:#005EB8; --sur:#E05C1A; --oeste:#00875A;
  --sh: 0 2px 16px rgba(0,94,184,.10);
  --sh2: 0 8px 40px rgba(0,94,184,.18);
  --r:10px; --r2:16px;
  --font:'Sora',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.55;min-height:100vh}
#root{display:flex;flex-direction:column;min-height:100vh}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--borde);border-radius:3px}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,var(--c1d) 0%,var(--c1) 55%,var(--c1l) 100%);
  padding:0;position:relative;overflow:hidden;
}
.hdr::before{
  content:'';position:absolute;inset:0;opacity:.07;
  background-image:radial-gradient(circle at 20% 50%,#fff 1px,transparent 1px),
    radial-gradient(circle at 80% 20%,#fff 1px,transparent 1px);
  background-size:40px 40px;
}
.hdr-inner{
  max-width:1340px;margin:0 auto;padding:2.5rem 2rem 2rem;
  display:grid;grid-template-columns:1fr auto;gap:2rem;
  align-items:center;position:relative;z-index:1;
}
.hdr-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:99px;padding:4px 12px;
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.7);margin-bottom:.75rem;
}
.hdr-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--c4)}
h1.hdr-title{
  font-size:clamp(1.7rem,3.5vw,2.6rem);font-weight:800;
  color:#fff;line-height:1.1;letter-spacing:-.035em;
}
h1.hdr-title b{color:var(--c4);font-weight:800}
.hdr-desc{font-size:13px;color:rgba(255,255,255,.55);margin-top:.5rem;font-weight:300}
.hdr-chips{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.hdr-chip{
  background:rgba(255,255,255,.1);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);border-radius:var(--r);
  padding:.65rem 1.2rem;text-align:right;min-width:130px;
}
.hdr-chip-v{font-family:var(--mono);font-size:1.35rem;font-weight:700;color:#fff;line-height:1}
.hdr-chip-l{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* ── NAV ── */
.nav{background:var(--c1d);border-bottom:3px solid var(--c4);position:sticky;top:0;z-index:300}
.nav-inner{max-width:1340px;margin:0 auto;padding:0 2rem;display:flex;gap:0;overflow-x:auto}
.nav-btn{
  font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:.95rem 1.5rem;
  color:rgba(255,255,255,.45);border:none;background:none;cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-3px;
  transition:all .15s;white-space:nowrap;
}
.nav-btn:hover{color:rgba(255,255,255,.8)}
.nav-btn.active{color:#fff;border-bottom-color:var(--c4)}

/* ── WRAP ── */
.wrap{max-width:1340px;margin:0 auto;padding:2rem 2.5rem;flex:1}

/* ── SECTION HEAD ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;flex-wrap:wrap;gap:.5rem}
.sh-t{
  font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--c1);display:flex;align-items:center;gap:8px;
}
.sh-t::before{content:'';width:3px;height:14px;background:var(--c4);border-radius:2px}
.sh-n{font-size:11px;color:var(--ink3)}

/* ── KPIS ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.kpi{
  background:var(--card);border-radius:var(--r2);
  padding:1.4rem 1.5rem;box-shadow:var(--sh);
  border-left:4px solid var(--c1);
  transition:transform .15s,box-shadow .15s;cursor:default;
}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.kpi.c2{border-color:var(--c2)} .kpi.c3{border-color:var(--c3)}
.kpi.c4{border-color:var(--c4)} .kpi.c5{border-color:var(--c1l)}
.kpi-l{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:.5rem}
.kpi-v{font-family:var(--mono);font-size:1.85rem;font-weight:700;color:var(--ink);line-height:1}
.kpi-s{font-size:10px;color:var(--ink3);margin-top:.3rem}

/* ── CARDS CHART ── */
.chart-grid{display:grid;gap:1.25rem;margin-bottom:2rem}
.chart-grid.g2{grid-template-columns:1fr 1fr}
.chart-grid.g3{grid-template-columns:1fr 1fr 1fr}
.chart-grid.g1{grid-template-columns:1fr}
.ccard{background:var(--card);border-radius:var(--r2);padding:1.5rem;box-shadow:var(--sh);position:relative;overflow:hidden}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--c1),var(--c1l))}
.ccard-canvas{position:relative;height:270px}
.ccard-canvas.tall{height:235px}

.ccard.g2{grid-column:span 2}
.ccard.accent2::before{background:linear-gradient(90deg,var(--c2),var(--c4))}
.ccard.accent3::before{background:linear-gradient(90deg,var(--c3),var(--c1l))}
.ccard-t{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:1rem}



/* ── FILTROS ── */
.fbar{background:var(--card);border-radius:var(--r2);padding:1rem 1.25rem;box-shadow:var(--sh);display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
.fl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3)}
.pill{font-size:11px;font-weight:600;padding:5px 15px;border-radius:99px;border:1.5px solid var(--borde);background:transparent;color:var(--ink2);cursor:pointer;transition:all .14s;font-family:var(--font)}
.pill:hover{border-color:var(--c1);color:var(--c1)}
.pill.on{background:var(--c1);color:#fff;border-color:var(--c1)}
.sep{width:1px;height:20px;background:var(--borde)}

/* ── TABLA ── */
.tw{overflow-x:auto;border-radius:var(--r2);box-shadow:var(--sh);width:100%}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:var(--card)}
thead th{
  background:var(--c1d);color:rgba(255,255,255,.8);
  padding:10px 13px;text-align:left;
  font-family:var(--mono);font-size:9.5px;font-weight:600;
  letter-spacing:.07em;white-space:nowrap;
}
thead th:first-child{border-radius:var(--r2) 0 0 0}
thead th:last-child{border-radius:0 var(--r2) 0 0}
thead th.ts{cursor:pointer;user-select:none;transition:background .12s}
thead th.ts:hover{background:#1a3060}
thead th.ts.on{background:var(--c1)}
.sa{margin-left:3px;opacity:.55}
.ts.on .sa{opacity:1}
tbody tr{border-bottom:1px solid var(--bg);transition:background .1s;cursor:pointer}
tbody tr:hover{background:#EDF3FF}
tbody tr:nth-child(even){background:#F8FAFF}
tbody tr:nth-child(even):hover{background:#EDF3FF}
td{padding:9px 13px;vertical-align:middle}
td.mn{font-weight:700;font-size:13px;color:var(--c1d)}
td.n{font-family:var(--mono);font-size:11.5px;text-align:right;font-weight:500;color:var(--ink)}
td.na{font-family:var(--mono);font-size:11.5px;text-align:right;color:var(--borde)}
.zch{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.05em}
.zn{background:#DBEAFE;color:var(--norte)}
.zs{background:#FEE8DC;color:var(--sur)}
.zo{background:#DCFCE7;color:var(--oeste)}
.dch{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.06em;font-family:var(--mono)}
.dr{background:#D1FAE5;color:#065F46}
.da{background:#DBEAFE;color:#1E3A8A}
.dp{background:var(--bg);color:var(--ink3)}

/* ── PANEL ── */
.panel{display:none;border-radius:var(--r2);background:var(--card);box-shadow:var(--sh2);margin-bottom:1.5rem;overflow:hidden;border-top:4px solid var(--c1)}
.panel.open{display:block;animation:pIn .2s ease}
@keyframes pIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.ph{background:linear-gradient(130deg,var(--c1d) 0%,var(--c1) 100%);padding:1.5rem 2rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.ph-title{font-size:1.35rem;font-weight:800;color:#fff;letter-spacing:-.02em}
.ph-sub{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.3rem;align-items:center}
.p-close{background:rgba(255,255,255,.15);border:none;border-radius:var(--r);color:#fff;font-size:10px;font-weight:700;letter-spacing:.07em;padding:6px 14px;cursor:pointer;font-family:var(--mono);white-space:nowrap;margin-top:4px;transition:background .12s}
.p-close:hover{background:rgba(255,255,255,.28)}
.pb{padding:1.75rem 2rem}
.pk-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:.75rem;margin-bottom:1.5rem}
.pk{background:var(--bg);border-radius:var(--r);padding:.875rem 1rem}
.pk-l{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:.35rem}
.pk-v{font-family:var(--mono);font-size:1.2rem;font-weight:700;color:var(--ink)}
.pk-s{font-size:10px;color:var(--ink3);margin-top:.2rem}
.p2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.pst{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:.875rem;display:flex;align-items:center;gap:6px}
.pst::before{content:'';width:3px;height:11px;background:var(--c1);border-radius:2px}
.sbar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sbn{font-size:11px;color:var(--ink2);width:155px;flex-shrink:0;text-align:right;font-weight:500}
.sbt{flex:1;background:var(--bg);border-radius:3px;height:18px;overflow:hidden}
.sbf{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px}
.sbp{font-size:9.5px;font-weight:700}
.sbm{font-size:9.5px;color:var(--ink3);min-width:50px;text-align:right;font-family:var(--mono)}
.tt{width:100%;border-collapse:collapse}
.tt tr{border-bottom:1px solid var(--bg)}
.tt tr:last-child{border:none}
.tt td{padding:5px 2px;font-size:12px;color:var(--ink2)}
.tt td:last-child{text-align:right;font-family:var(--mono);font-weight:600;color:var(--ink)}
.pend{background:var(--bg);border-radius:var(--r);padding:1.25rem;text-align:center;font-size:12px;color:var(--ink3)}

/* ── TISH VIEW ── */
.tish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem}
.tc{background:var(--card);border-radius:var(--r2);padding:1.25rem;box-shadow:var(--sh);border-left:4px solid var(--c1);transition:transform .15s}
.tc:hover{transform:translateY(-2px)}
.tc-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem}
.tc-n{font-weight:700;font-size:13px;color:var(--ink)}
.tc-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;font-family:var(--mono)}
.tc-sub{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:.5rem}
.tc-row{display:flex;justify-content:space-between;font-size:11px;border-bottom:1px solid var(--bg);padding:3px 0;color:var(--ink2)}
.tc-row span:last-child{font-family:var(--mono);font-weight:600;color:var(--ink)}
.tc-foot{font-size:9.5px;color:var(--ink3);margin-top:.5rem}

/* ── FOOTER ── */
footer{background:var(--c1d);color:rgba(255,255,255,.35);padding:1.5rem 2rem;font-family:var(--mono);font-size:10px;letter-spacing:.04em}
.fi{max-width:1340px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem}


@media(min-width:1200px){
  .chart-grid.g2{grid-template-columns:1fr 1fr}
  .kpi-row{grid-template-columns:repeat(5,1fr)}
  .ccard-canvas{height:290px}
  .ccard-canvas.tall{height:250px}
}
@media(min-width:1400px){
  .ccard-canvas{height:310px}
  .ccard-canvas.tall{height:270px}
}

@media(max-width:900px){
  .hdr-inner{grid-template-columns:1fr;padding:1.5rem 1rem}
  .hdr-chips{display:none}
  .wrap{padding:1rem}
  .chart-grid.g2,.chart-grid.g3{grid-template-columns:1fr}
  .ccard.g2{grid-column:1}
  .p2{grid-template-columns:1fr}
  .sbn{width:110px}
}

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

/* ═══ HELPERS ═══ */
const fmtN = n => n != null ? Number(n).toLocaleString('es-AR') : '—';
const fmtMM = n => {
  if (!n) return '—';
  return n >= 1000
    ? '$' + (n/1000).toLocaleString('es-AR', {maximumFractionDigits:2}) + ' mm'
    : '$' + fmtN(n) + ' M$';
};
const fmtK = n => n ? '$' + Math.round(n/1000).toLocaleString('es-AR') + 'K' : '—';
const ppc = (p, pop) => (p && pop) ? Math.round(p * 1e6 / pop) : null;
const ZONA = {norte:'Norte', sur:'Sur', oeste:'Oeste'};
const CZONA = {norte:'#005EB8', sur:'#E05C1A', oeste:'#00875A'};
const PALETA = ['#005EB8','#E05C1A','#00875A','#F5A623','#0099CC','#7C3AED','#DB2777','#0891B2','#065F46','#92400E','#1E40AF','#BE185D'];
const GC = 'rgba(0,94,184,.06)', TC = '#8A9CC0';

/* ═══ CHART HOOK ═══ */
function useChart(id, config, deps) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const existing = Chart.getChart(id);
    if (existing) existing.destroy();
    new Chart(ref.current, config);
  }, deps);
  return ref;
}

/* ═══ HEADER ═══ */
function Header({data}) {
  const totPob = data.reduce((a,m) => a + m.poblacion, 0);
  const conPres = data.filter(m => m.presupuesto_2025).length;
  const totPBG = data.filter(m=>m.pbg_corriente_2023).reduce((a,m)=>a+m.pbg_corriente_2023,0);
  return (
    <header className="hdr">
      <div className="hdr-inner">
        <div>
          <div className="hdr-pill">Datos Públicos · Provincia de Buenos Aires</div>
          <h1 className="hdr-title">Observatorio Fiscal<br/><b>del Conurbano</b></h1>
          <p className="hdr-desc">24 partidos · Presupuesto · PBG · TISH · 2025</p>
        </div>
        <div className="hdr-chips">
          <div className="hdr-chip">
            <div className="hdr-chip-v">{(totPob/1e6).toFixed(1)}M</div>
            <div className="hdr-chip-l">habitantes</div>
          </div>
          <div className="hdr-chip">
            <div className="hdr-chip-v">${(totPBG/1000).toFixed(0)} mm</div>
            <div className="hdr-chip-l">PBG corriente</div>
          </div>
          <div className="hdr-chip">
            <div className="hdr-chip-v">{conPres}/24</div>
            <div className="hdr-chip-l">con presupuesto</div>
          </div>
        </div>
      </div>
    </header>
  );
}

/* ═══ NAV ═══ */
function Nav({view, setView}) {
  const tabs = [
    {id:'dashboard', label:'Dashboard'},
    {id:'tabla', label:'Tabla comparativa'},
    {id:'tish', label:'Tasas TISH'},
  ];
  return (
    <nav className="nav">
      <div className="nav-inner">
        {tabs.map(t => (
          <button key={t.id} className={`nav-btn ${view===t.id?'active':''}`}
            onClick={() => setView(t.id)}>{t.label}</button>
        ))}
      </div>
    </nav>
  );
}

/* ═══ KPI CARD ═══ */
function KPI({label, value, sub, cls=''}) {
  return (
    <div className={`kpi ${cls}`}>
      <div className="kpi-l">{label}</div>
      <div className="kpi-v">{value}</div>
      {sub && <div className="kpi-s">{sub}</div>}
    </div>
  );
}

/* ═══ CHART WRAPPER ═══ */
function ChartBox({title, cls='', canvasCls='', children, chartId, chartConfig, deps=[]}) {
  const ref = useChart(chartId, chartConfig, deps);
  return (
    <div className={`ccard ${cls}`}>
      <div className="ccard-t">{title}</div>
      <div className={`ccard-canvas ${canvasCls}`}>
        <canvas ref={ref} id={chartId}></canvas>
      </div>
    </div>
  );
}

/* ═══ DASHBOARD ═══ */
function Dashboard({data}) {
  const conPres = data.filter(m=>m.presupuesto_2025);
  const conPBG = data.filter(m=>m.pbg_corriente_2023);
  const totPob = data.reduce((a,m)=>a+m.poblacion,0);
  const totPres = conPres.reduce((a,m)=>a+m.presupuesto_2025,0);
  const totPBG = conPBG.reduce((a,m)=>a+m.pbg_corriente_2023,0);
  const maxPBGpc = data.filter(m=>m.pbg_constante_2004_2023)
    .map(m=>({n:m.nombre,v:Math.round(m.pbg_constante_2004_2023*1e6/m.poblacion)}))
    .sort((a,b)=>b.v-a.v)[0];
  const maxPrespc = conPres.map(m=>({n:m.nombre,v:Math.round(m.presupuesto_2025*1e6/m.poblacion)}))
    .sort((a,b)=>b.v-a.v)[0];

  const baseOpts = (cb) => ({
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{grid:{color:GC}, ticks:{color:TC, font:{size:9.5}, maxRotation:35}},
      y:{grid:{color:GC}, ticks:{color:TC, font:{size:9.5}, callback:cb}}
    }
  });

  const pbgList = [...data].filter(m=>m.pbg_corriente_2023)
    .sort((a,b)=>b.pbg_corriente_2023-a.pbg_corriente_2023).slice(0,12);
  const pbgPcList = [...data].filter(m=>m.pbg_constante_2004_2023)
    .map(m=>({...m, pc:Math.round(m.pbg_constante_2004_2023*1e6/m.poblacion)}))
    .sort((a,b)=>b.pc-a.pc);
  const presPcList = conPres.map(m=>({...m, pc:Math.round(m.presupuesto_2025*1e6/m.poblacion)}))
    .sort((a,b)=>b.pc-a.pc);
  const popList = [...data].sort((a,b)=>b.poblacion-a.poblacion);

  return (
    <div className="wrap">
      <div className="kpi-row">
        <KPI label="Población total" value={`${(totPob/1e6).toFixed(1)}M`} sub="hab. · Censo 2022"/>
        <KPI label="Presupuesto total" value={`$${(totPres/1000).toLocaleString('es-AR',{maximumFractionDigits:1})} mm`} sub={`${conPres.length} municipios`} cls="c2"/>
        <KPI label="PBG corriente total" value={`$${(totPBG/1000).toFixed(0)} mm`} sub="DPE-PBA 2023" cls="c3"/>
        <KPI label="Mayor PBG pc" value={maxPBGpc?fmtK(maxPBGpc.v):'—'} sub={maxPBGpc?.n+' · cte.2004'} cls="c4"/>
        <KPI label="Mayor presup. pc" value={maxPrespc?fmtK(maxPrespc.v):'—'} sub={maxPrespc?.n+' · 2025'} cls="c5"/>
      </div>

      <div className="sh"><span className="sh-t">PBG corriente 2023</span><span className="sh-n">DPE-PBA · mil millones de pesos</span></div>
      <div className="chart-grid g1" style={{marginBottom:'2rem'}}>
        <ChartBox title="PBG total corriente — top 12 partidos (mm $)" chartId="c-pbg"
          canvasCls="tall"
          chartConfig={{type:'bar', data:{
            labels:pbgList.map(m=>m.nombre),
            datasets:[{data:pbgList.map(m=>+(m.pbg_corriente_2023/1000).toFixed(2)),
              backgroundColor:pbgList.map(m=>CZONA[m.zona]),borderRadius:5,borderSkipped:false}]
          }, options:{...baseOpts(v=>'$'+v+' mm'),animation:{duration:800}}}}
          deps={[data]}/>
      </div>

      <div className="sh"><span className="sh-t">Per cápita comparado</span><span className="sh-n">Por habitante</span></div>
      <div className="chart-grid g2">
        <ChartBox title="PBG pc — constante 2004 ($ por hab.)" cls="accent3" chartId="c-pbg-pc"
          chartConfig={{type:'bar', data:{
            labels:pbgPcList.map(m=>m.nombre),
            datasets:[{data:pbgPcList.map(m=>m.pc), backgroundColor:'#00875A', borderRadius:5}]
          }, options:{...baseOpts(v=>'$'+Math.round(v/1000)+'K'), animation:{duration:600}}}}
          deps={[data]}/>
        <ChartBox title="Presupuesto pc 2025 ($ por hab.)" cls="accent2" chartId="c-pres-pc"
          chartConfig={{type:'bar', data:{
            labels:presPcList.map(m=>m.nombre),
            datasets:[{data:presPcList.map(m=>m.pc), backgroundColor:'#E05C1A', borderRadius:5}]
          }, options:{...baseOpts(v=>'$'+Math.round(v/1000)+'K'), animation:{duration:600}}}}
          deps={[data]}/>
      </div>

      <div className="sh"><span className="sh-t">Demografía</span><span className="sh-n">INDEC Censo 2022</span></div>
      <div className="chart-grid g1">
        <ChartBox title="Población — 24 partidos del Conurbano" canvasCls="tall" chartId="c-pop"
          chartConfig={{type:'bar', data:{
            labels:popList.map(m=>m.nombre),
            datasets:[{data:popList.map(m=>m.poblacion), backgroundColor:popList.map(m=>CZONA[m.zona]), borderRadius:4}]
          }, options:{...baseOpts(v=>Math.round(v/1000)+'k'), animation:{duration:500}}}}
          deps={[data]}/>
      </div>
    </div>
  );
}

/* ═══ PANEL DETALLE ═══ */
function Panel({muni, onClose}) {
  if (!muni) return null;
  const m = muni;
  const prespc = ppc(m.presupuesto_2025, m.poblacion);
  const pbgpc = m.pbg_corriente_2023 ? Math.round(m.pbg_corriente_2023*1e6/m.poblacion) : null;
  const pbgpc_cte = m.pbg_constante_2004_2023 ? Math.round(m.pbg_constante_2004_2023*1e6/m.poblacion) : null;
  const dens = m.superficie_km2 ? Math.round(m.poblacion/m.superficie_km2) : null;
  const dq = m.dato_calidad==='real'?'dr':m.dato_calidad==='aprobado'?'da':'dp';
  const dl = m.dato_calidad==='real'?'Real':m.dato_calidad==='aprobado'?'Aprobado':'Pendiente';
  const tieneSec = m.secretarias?.length > 0;
  const tieneTish = m.tish?.escala?.length > 0;

  return (
    <div className="panel open">
      <div className="ph">
        <div>
          <div className="ph-title">{m.nombre}</div>
          <div className="ph-sub">
            <span className={`zch z${m.zona[0]}`}>{ZONA[m.zona]}</span>
            <span className={`dch ${dq}`}>{dl} · {m.dato_fuente||''}</span>
            {m.sector_principal && <span style={{fontSize:'11px',color:'rgba(255,255,255,.5)'}}>Sector líder: {m.sector_principal}</span>}
          </div>
        </div>
        <button className="p-close" onClick={onClose}>✕ CERRAR</button>
      </div>
      <div className="pb">
        <div className="pk-row">
          {[
            {l:'Población', v:fmtN(m.poblacion), s:'Censo 2022'},
            {l:'Superficie', v:m.superficie_km2?fmtN(m.superficie_km2)+' km²':'—', s:dens?fmtN(dens)+' hab/km²':''},
            {l:'PBG corriente 2023', v:m.pbg_corriente_2023?fmtMM(m.pbg_corriente_2023):'—', s:pbgpc?'pc: '+fmtK(pbgpc):''},
            {l:'PBG cte.2004', v:m.pbg_constante_2004_2023?fmtMM(m.pbg_constante_2004_2023):'—', s:pbgpc_cte?'pc: '+fmtK(pbgpc_cte):''},
            {l:'Presupuesto 2025', v:m.presupuesto_2025?fmtMM(m.presupuesto_2025):'—', s:prespc?'pc: '+fmtK(prespc):''},
            {l:'Rec. percibidos', v:m.recursos_percibidos_2025?fmtMM(m.recursos_percibidos_2025):'—', s:''},
          ].map((k,i) => (
            <div key={i} className="pk">
              <div className="pk-l">{k.l}</div>
              <div className="pk-v">{k.v}</div>
              {k.s && <div className="pk-s">{k.s}</div>}
            </div>
          ))}
        </div>
        <div className="p2">
          <div>
            <div className="pst">Gasto por secretaría</div>
            {tieneSec ? m.secretarias.map((s,i) => (
              <div key={i} className="sbar">
                <span className="sbn">{s.nombre}</span>
                <div className="sbt">
                  <div className="sbf" style={{width:`${s.pct/m.secretarias[0].pct*100}%`, background:PALETA[i%PALETA.length]+'22'}}>
                    <span className="sbp" style={{color:PALETA[i%PALETA.length]}}>{s.pct}%</span>
                  </div>
                </div>
                {s.monto_m && <span className="sbm">{s.monto_m>=1000?'$'+(s.monto_m/1000).toFixed(1)+' mm':'$'+Math.round(s.monto_m)+'M'}</span>}
              </div>
            )) : <div className="pend">Adjuntá la rendición para ver el desglose.</div>}
          </div>
          <div>
            <div className="pst">Tasa {m.tish?.nombre_tasa||'TISH'}</div>
            {tieneTish ? (
              <table className="tt">
                <tbody>
                  <tr><td>Nombre</td><td>{m.tish.nombre_tasa}</td></tr>
                  <tr><td>Alícuota base</td><td>{m.tish.alicuota_base_milesimos}‰</td></tr>
                  {m.tish.minimo_bimestral_comercio_mf && <tr><td>Mín. comercio</td><td>{fmtN(m.tish.minimo_bimestral_comercio_mf)} MF</td></tr>}
                  {m.tish.minimo_bimestral_industria_mf && <tr><td>Mín. industria</td><td>{fmtN(m.tish.minimo_bimestral_industria_mf)} MF</td></tr>}
                  {(m.tish.escala||[]).map((e,i) => <tr key={i}><td>Hasta {e.hasta_mf||e.hasta} MF</td><td>{e.alicuota}‰</td></tr>)}
                  {m.tish.recaudado_2025_millones && <tr><td>Recaudado 2025</td><td>{fmtMM(m.tish.recaudado_2025_millones)}</td></tr>}
                </tbody>
              </table>
            ) : <div className="pend">{m.tish?.fuente||'Pendiente de carga.'}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ TABLA ═══ */
function Tabla({data}) {
  const [zona, setZona] = useState('todos');
  const [sort, setSort] = useState('nombre');
  const [panel, setPanel] = useState(null);

  const lista = data
    .filter(m => zona==='todos' || m.zona===zona)
    .sort((a,b) => {
      if(sort==='nombre') return a.nombre.localeCompare(b.nombre,'es');
      if(sort==='poblacion') return b.poblacion-a.poblacion;
      if(sort==='densidad') return (b.superficie_km2?b.poblacion/b.superficie_km2:0)-(a.superficie_km2?a.poblacion/a.superficie_km2:0);
      if(sort==='pbg_corr') return (b.pbg_corriente_2023||0)-(a.pbg_corriente_2023||0);
      if(sort==='pbg_pc') return (b.pbg_constante_2004_2023?b.pbg_constante_2004_2023/b.poblacion:0)-(a.pbg_constante_2004_2023?a.pbg_constante_2004_2023/a.poblacion:0);
      if(sort==='presupuesto') return (b.presupuesto_2025||0)-(a.presupuesto_2025||0);
      if(sort==='pres_pc') return (b.presupuesto_2025?b.presupuesto_2025/b.poblacion:0)-(a.presupuesto_2025?a.presupuesto_2025/a.poblacion:0);
      if(sort==='tish') return (b.tish?.alicuota_base_milesimos||0)-(a.tish?.alicuota_base_milesimos||0);
      return 0;
    });

  const Th = ({s, children}) => (
    <th className={`ts ${sort===s?'on':''}`} onClick={() => setSort(s)}>
      {children} <span className="sa">{sort===s?'▼':'↕'}</span>
    </th>
  );

  const openPanel = (m) => {
    setPanel(panel?.id===m.id ? null : m);
    setTimeout(() => document.getElementById('panel-anchor')?.scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
  };

  return (
    <div className="wrap">
      <div className="fbar">
        <span className="fl">Zona</span>
        {['todos','norte','sur','oeste'].map(z => (
          <button key={z} className={`pill ${zona===z?'on':''}`} onClick={()=>{setZona(z);setPanel(null)}}>
            {z==='todos'?'Todos':ZONA[z]}
          </button>
        ))}
        <div className="sep"/>
        <span className="fl" style={{color:'var(--ink3)'}}>Clic en municipio → detalle</span>
      </div>

      <div id="panel-anchor"/>
      {panel && <Panel muni={panel} onClose={()=>setPanel(null)}/>}

      <div className="tw">
        <table>
          <thead>
            <tr>
              <Th s="nombre">Municipio</Th>
              <th>Zona</th>
              <Th s="poblacion">Población</Th>
              <th>Sup. km²</th>
              <Th s="densidad">Densidad</Th>
              <Th s="pbg_corr">PBG corr. 2023</Th>
              <Th s="pbg_pc">PBG pc cte.04</Th>
              <th>Sector líder</th>
              <Th s="presupuesto">Presup. 2025</Th>
              <Th s="pres_pc">Presup. pc</Th>
              <th>Rec. percibidos</th>
              <Th s="tish">TISH</Th>
              <th>Dato</th>
            </tr>
          </thead>
          <tbody>
            {lista.map(m => {
              const prespc = ppc(m.presupuesto_2025, m.poblacion);
              const pbgpc_cte = m.pbg_constante_2004_2023 ? Math.round(m.pbg_constante_2004_2023*1e6/m.poblacion) : null;
              const dens = m.superficie_km2 ? Math.round(m.poblacion/m.superficie_km2) : null;
              const dq = m.dato_calidad==='real'?'dr':m.dato_calidad==='aprobado'?'da':'dp';
              const dl = m.dato_calidad==='real'?'Real':m.dato_calidad==='aprobado'?'Aprob.':'Pend.';
              return (
                <tr key={m.id} onClick={() => openPanel(m)} style={{background:panel?.id===m.id?'#EDF3FF':''}}>
                  <td className="mn">{m.nombre}</td>
                  <td><span className={`zch z${m.zona[0]}`}>{ZONA[m.zona]}</span></td>
                  <td className="n">{fmtN(m.poblacion)}</td>
                  <td className={m.superficie_km2?'n':'na'}>{m.superficie_km2?fmtN(m.superficie_km2):'—'}</td>
                  <td className={dens?'n':'na'}>{dens?fmtN(dens):'—'}</td>
                  <td className={m.pbg_corriente_2023?'n':'na'}>{m.pbg_corriente_2023?fmtMM(m.pbg_corriente_2023):'—'}</td>
                  <td className={pbgpc_cte?'n':'na'}>{pbgpc_cte?fmtK(pbgpc_cte):'—'}</td>
                  <td style={{fontSize:'11px',color:'var(--ink3)',fontStyle:'italic'}}>{m.sector_principal||'—'}</td>
                  <td className={m.presupuesto_2025?'n':'na'}>{m.presupuesto_2025?fmtMM(m.presupuesto_2025):'—'}</td>
                  <td className={prespc?'n':'na'}>{prespc?fmtK(prespc):'—'}</td>
                  <td className={m.recursos_percibidos_2025?'n':'na'}>{m.recursos_percibidos_2025?fmtMM(m.recursos_percibidos_2025):'—'}</td>
                  <td className={m.tish?.alicuota_base_milesimos!=null?'n':'na'}>{m.tish?.alicuota_base_milesimos!=null?m.tish.alicuota_base_milesimos+'‰':'—'}</td>
                  <td><span className={`dch ${dq}`}>{dl}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═══ TISH ═══ */
function TishView({data}) {
  const conTish = data.filter(m => m.tish?.alicuota_base_milesimos != null);
  const sinTish = data.filter(m => m.tish?.alicuota_base_milesimos == null);
  const colores = ['#005EB8','#E05C1A','#00875A','#7C3AED','#F5A623','#DB2777'];

  return (
    <div className="wrap">
      <div className="sh">
        <span className="sh-t">Tasas de Seguridad e Higiene</span>
        <span className="sh-n">{conTish.length} con dato · {sinTish.length} pendientes</span>
      </div>
      <div className="tish-grid">
        {conTish.map((m,i) => {
          const c = colores[i%colores.length];
          return (
            <div key={m.id} className="tc" style={{borderColor:c}}>
              <div className="tc-h">
                <div className="tc-n">{m.nombre}</div>
                <span className="tc-badge" style={{background:c+'18',color:c}}>{m.tish.alicuota_base_milesimos}‰</span>
              </div>
              <div className="tc-sub">{m.tish.nombre_tasa||'TISH'}</div>
              {(m.tish.escala||[]).map((e,j) => (
                <div key={j} className="tc-row">
                  <span>Hasta {e.hasta_mf||e.hasta} MF</span>
                  <span>{e.alicuota}‰</span>
                </div>
              ))}
              {m.tish.minimo_bimestral_comercio_mf && (
                <div className="tc-foot">Mín. comercio: <b>{fmtN(m.tish.minimo_bimestral_comercio_mf)} MF</b> · industria: <b>{fmtN(m.tish.minimo_bimestral_industria_mf)} MF</b></div>
              )}
              <div className="tc-foot" style={{marginTop:m.tish.minimo_bimestral_comercio_mf?'0':'.4rem'}}>{m.tish.fuente||''}</div>
            </div>
          );
        })}
        {sinTish.map(m => (
          <div key={m.id} className="tc" style={{borderColor:'var(--borde)',opacity:.6}}>
            <div className="tc-n">{m.nombre}</div>
            <div className="tc-sub" style={{marginTop:'.4rem'}}>PENDIENTE</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
function App() {
  const [data, setData] = useState([]);
  const [view, setView] = useState('dashboard');

  useEffect(() => {
    fetch('datos.json').then(r=>r.json()).then(d=>setData(d.municipios)).catch(console.error);
  }, []);

  if (!data.length) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:'1rem'}}>
      <div style={{width:48,height:48,border:'4px solid #005EB8',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
      <p style={{color:'var(--ink3)',fontFamily:'var(--mono)',fontSize:13}}>Cargando datos...</p>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}
</style>
    </div>
  );

  return (
    <>
      <Header data={data}/>
      <Nav view={view} setView={setView}/>
      {view==='dashboard' && <Dashboard data={data}/>}
      {view==='tabla' && <Tabla data={data}/>}
      {view==='tish' && <TishView data={data}/>}
      <footer>
        <div className="fi">
          <span>Observatorio Fiscal del Conurbano · 2025–2026</span>
          <span>DPE-PBA · RAFAM · INDEC Censo 2022 · HCD Municipales</span>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
